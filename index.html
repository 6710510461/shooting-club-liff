<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>สมัครสมาชิกชมรมยิงปืน</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      min-height: 100vh;
      margin: auto;
      padding: 24px;
      background: #f5f5f5;
    }

    .card {
      padding: 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      color: #666666;
      font-size: 14px;
    }

    .member-type {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .type-button {
      padding: 12px;
      border: 1px solid #cccccc;
      background: #eeeeee;
      color: #222222;
    }

    .type-button.active {
      border-color: #222222;
      background: #222222;
      color: #ffffff;
    }

    input,
    select {
      width: 100%;
      padding: 13px;
      margin-bottom: 12px;
      border: 1px solid #cccccc;
      border-radius: 8px;
      background: #ffffff;
      font-size: 16px;
    }

    input:focus,
    select:focus {
      border-color: #333333;
      outline: none;
    }

    #registerButton {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 8px;
      background: #222222;
      color: #ffffff;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #statusText {
      margin-top: 16px;
      text-align: center;
      color: #666666;
      font-size: 14px;
      white-space: pre-line;
    }

    .success {
      color: #16863a !important;
    }

    .error {
      color: #c62828 !important;
    }

    .language-switcher {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-bottom: 18px;
}

.language-button {
  width: auto;
  padding: 7px 12px;
  border: 1px solid #cccccc;
  border-radius: 20px;
  background: #ffffff;
  color: #555555;
  font-size: 13px;
  cursor: pointer;
}

.language-button.active {
  border-color: #222222;
  background: #222222;
  color: #ffffff;
}
  </style>
</head>

<body>

  <div class="card">
<div class="language-switcher">
  <button
    id="thaiLanguageButton"
    type="button"
    class="language-button active"
    onclick="changeLanguage('th')"
  >
    ไทย
  </button>

  <button
    id="englishLanguageButton"
    type="button"
    class="language-button"
    onclick="changeLanguage('en')"
  >
    English
  </button>
</div>
    
    <h2 id="pageTitle">
  สมัครสมาชิกชมรมยิงปืน
</h2>

    <p
  id="pageSubtitle"
  class="subtitle"
>
  กรุณาเลือกประเภทสมาชิกและกรอกข้อมูล
</p>
    
    <div class="member-type">
      <button
        id="studentTypeButton"
        type="button"
        class="type-button active"
        onclick="selectMemberType('Student')"
      >
        นักศึกษา
      </button>

      <button
        id="personnelTypeButton"
        type="button"
        class="type-button"
        onclick="selectMemberType('Personnel')"
      >
        บุคลากร
      </button>
    </div>

    <input
      id="universityId"
      type="text"
      inputmode="numeric"
      maxlength="20"
      placeholder="รหัสนักศึกษา"
    >

    <input
      id="name"
      type="text"
      maxlength="100"
      placeholder="ชื่อ - นามสกุล"
    >

    <select id="facultyOrUnit"></select>

    <button
      id="registerButton"
      type="button"
      onclick="saveData()"
      disabled
    >
      กำลังเชื่อมต่อ LINE...
    </button>

    <div id="statusText">
      กำลังเริ่มต้นระบบ LINE...
    </div>

  </div>

    id="apiFrame"

let currentLanguage =
  localStorage.getItem(
    "shootingClubLanguage"
  ) || "th";

function getText(key) {
  return (
    TRANSLATIONS[currentLanguage][key] ||
    TRANSLATIONS.th[key] ||
    key
  );
}

function changeLanguage(language) {
  if (
    language !== "th" &&
    language !== "en"
  ) {
    return;
  }

  currentLanguage = language;

  localStorage.setItem(
    "shootingClubLanguage",
    language
  );

  applyLanguage();
}

function applyLanguage() {
  document.documentElement.lang =
    currentLanguage;

  document.getElementById(
    "pageTitle"
  ).textContent =
    getText("pageTitle");

  document.getElementById(
    "pageSubtitle"
  ).textContent =
    getText("pageSubtitle");

  document.getElementById(
    "studentTypeButton"
  ).textContent =
    getText("student");

  document.getElementById(
    "personnelTypeButton"
  ).textContent =
    getText("personnel");

  document.getElementById(
    "name"
  ).placeholder =
    getText("fullName");

  updateLanguageButtons();
  updateMemberTypeLanguage();
}

function updateLanguageButtons() {
  const thaiButton =
    document.getElementById(
      "thaiLanguageButton"
    );

  const englishButton =
    document.getElementById(
      "englishLanguageButton"
    );

  thaiButton.classList.toggle(
    "active",
    currentLanguage === "th"
  );

  englishButton.classList.toggle(
    "active",
    currentLanguage === "en"
  );
}

function updateMemberTypeLanguage() {

    document.getElementById(
      "universityId"
    );

      getText("studentId");

      getText("personnelId");

    renderPersonnelAffiliations();
  }

    const button =
      document.getElementById(
        "registerButton"
      );

    if (!button.disabled) {
      button.textContent =
        getText("register");
    }
  }
}

    function selectMemberType(type) {
  if (
    type !== "Student" &&
    type !== "Personnel"
  ) {
    return;
  }

  memberType = type;

  const studentButton =
    document.getElementById(
      "studentTypeButton"
    );

  const personnelButton =
    document.getElementById(
      "personnelTypeButton"
    );

  const universityId =
    document.getElementById(
      "universityId"
    );

  if (memberType === "Student") {
    studentButton.classList.add(
      "active"
    );

    personnelButton.classList.remove(
      "active"
    );

    universityId.inputMode =
      "numeric";

  } else {
    personnelButton.classList.add(
      "active"
    );

    studentButton.classList.remove(
      "active"
    );

    universityId.inputMode =
      "text";
  }

  // อัปเดต Placeholder และ Dropdown
  // ให้ตรงกับภาษาปัจจุบันทุกครั้ง
  updateMemberTypeLanguage();
}
    function clearAffiliationSelect() {
      const select =
        document.getElementById("facultyOrUnit");

      select.innerHTML = "";

      return select;
    }

    function createOption(value, text) {
      const option =
        document.createElement("option");

      option.value = value;
      option.textContent = text;

      return option;
    }

function renderStudentAffiliations() {
  const select =
    clearAffiliationSelect();

  select.appendChild(
    createOption(
      "",
      getText(
        "selectStudentAffiliation"
      )
    )
  );

  STUDENT_AFFILIATIONS.forEach(
    function(item) {
      const displayText =
        currentLanguage === "en"
          ? (
              STUDENT_AFFILIATION_TRANSLATIONS[
                item
              ] || item
            )
          : item;

      select.appendChild(
        createOption(
          item,
          displayText
        )
      );
    }
  );
}

function renderPersonnelAffiliations() {
  const select =
    clearAffiliationSelect();

  select.appendChild(
    createOption(
      "",
      getText(
        "selectPersonnelAffiliation"
      )
    )
  );

  PERSONNEL_GROUPS.forEach(
    function(group) {
      const optgroup =
        document.createElement(
          "optgroup"
        );

      optgroup.label =
        currentLanguage === "en"
          ? (
              PERSONNEL_GROUP_TRANSLATIONS[
                group.label
              ] || group.label
            )
          : group.label;

      group.items.forEach(
        function(item) {
          const displayText =
            currentLanguage === "en"
              ? (
                  PERSONNEL_UNIT_TRANSLATIONS[
                    item
                  ] || item
                )
              : item;

          optgroup.appendChild(
            createOption(
              item,
              displayText
            )
          );
        }
      );

      select.appendChild(
        optgroup
      );
    }
  );
}

    async function initializeLiff() {
      const button =
        document.getElementById("registerButton");

      const statusText =
        document.getElementById("statusText");

      try {
        statusText.className = "";
        statusText.textContent =
          "กำลังเชื่อมต่อกับ LINE...";

        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile =
          await liff.getProfile();

        lineIdToken =
          String(liff.getIDToken() || "").trim();

        if (!profile.userId || !lineIdToken) {
          throw new Error(
            "ไม่สามารถอ่านข้อมูลบัญชี LINE ได้"
          );
        }

        button.disabled = false;
        button.textContent =
          "สมัครสมาชิก";

        statusText.textContent =
          "พร้อมใช้งาน: " +
          (profile.displayName || "ผู้ใช้ LINE");

        statusText.className =
          "success";

      } catch (error) {
        console.error(error);

        button.disabled = true;
        button.textContent =
          "เชื่อมต่อ LINE ไม่สำเร็จ";

        statusText.textContent =
          error.message || "เกิดข้อผิดพลาด";

        statusText.className =
          "error";
      }
    }

    function saveData() {
      if (isSubmitting) {
        return;
      }

      const currentIdToken =
        String(liff.getIDToken() || "").trim();

      const decodedToken =
        liff.getDecodedIDToken();

      const currentTime =
        Math.floor(Date.now() / 1000);

      if (
        !currentIdToken ||
        !decodedToken ||
        !decodedToken.exp ||
        decodedToken.exp <= currentTime
      ) {
        alert(
          "ข้อมูลเข้าสู่ระบบ LINE หมดอายุแล้ว\n" +
          "กรุณาปิดหน้านี้แล้วเปิดใหม่อีกครั้ง"
        );

        if (liff.isInClient()) {
          liff.closeWindow();
        }

        return;
      }

      lineIdToken = currentIdToken;

      const universityId =
        document
          .getElementById("universityId")
          .value
          .trim();

      const name =
        document
          .getElementById("name")
          .value
          .trim();

      const facultyOrUnit =
        document
          .getElementById("facultyOrUnit")
          .value
          .trim();

      if (
        !universityId ||
        !name ||
        !facultyOrUnit
      ) {
        alert(
          "กรุณากรอกข้อมูลให้ครบทุกช่อง"
        );
        return;
      }

      if (
        memberType === "Student" &&
        !/^\d+$/.test(universityId)
      ) {
        alert(
          "รหัสนักศึกษาต้องเป็นตัวเลขเท่านั้น"
        );
        return;
      }

      const button =
        document.getElementById("registerButton");

      const statusText =
        document.getElementById("statusText");

      isSubmitting = true;

      button.disabled = true;
      button.textContent =
        "กำลังสมัคร...";

      statusText.className = "";
      statusText.textContent =
        "กำลังตรวจสอบและบันทึกข้อมูลสมาชิก...";

      currentRequestId =
        "req_" +
        Date.now() +
        "_" +
        Math.random()
          .toString(36)
          .slice(2);

      const form =
        document.createElement("form");

      form.method = "POST";
      form.action = WEB_APP_URL;
      form.target = "apiFrame";
      form.style.display = "none";

      const values = {
        action: "register",
        requestId: currentRequestId,
        universityId: universityId,
        name: name,
        facultyOrUnit: facultyOrUnit,
        memberType: memberType,
        idToken: lineIdToken
      };

      Object.keys(values).forEach(
        function(key) {
          const input =
            document.createElement("input");

          input.type = "hidden";
          input.name = key;
          input.value = values[key];

          form.appendChild(input);
        }
      );

      document.body.appendChild(form);

      form.submit();

      startResultPolling(
        currentRequestId
      );

      setTimeout(function() {
        if (form.isConnected) {
          form.remove();
        }
      }, 2000);
    }

    function startResultPolling(requestId) {
      const startedAt = Date.now();

      function poll() {
        if (
          Date.now() - startedAt >
          25000
        ) {
          handleRegisterTimeout();
          return;
        }

        const script =
          document.createElement("script");

        script.src =
          WEB_APP_URL +
          "?action=registerResult" +
          "&requestId=" +
          encodeURIComponent(requestId) +
          "&callback=registerResultCallback" +
          "&_=" +
          Date.now();

        script.onerror =
          function() {
            script.remove();

            resultPollTimer =
              setTimeout(
                poll,
                1000
              );
          };

        document.body.appendChild(script);

        setTimeout(function() {
          if (script.isConnected) {
            script.remove();
          }
        }, 3000);
      }

      window.registerResultCallback =
        function(result) {
          if (
            !result ||
            !result.ready
          ) {
            resultPollTimer =
              setTimeout(
                poll,
                1000
              );

            return;
          }

          handleRegisterResult(result);
        };

      poll();
    }

    function handleRegisterResult(result) {
      clearTimeout(resultPollTimer);

      isSubmitting = false;

      const button =
        document.getElementById("registerButton");

      const statusText =
        document.getElementById("statusText");

      alert(
        result.message ||
        "ระบบตอบกลับเรียบร้อย"
      );

      if (result.success) {
        button.disabled = true;
        button.textContent =
          "สมัครสำเร็จ";

        statusText.textContent =
          "สมัครสมาชิกสำเร็จ";

        statusText.className =
          "success";

        if (liff.isInClient()) {
          setTimeout(function() {
            liff.closeWindow();
          }, 800);
        }

        return;
      }

      button.disabled = false;
      button.textContent =
        "สมัครสมาชิก";

      statusText.textContent =
        result.message ||
        "สมัครสมาชิกไม่สำเร็จ";

      statusText.className =
        "error";
    }

    function handleRegisterTimeout() {
      clearTimeout(resultPollTimer);

      isSubmitting = false;

      const button =
        document.getElementById("registerButton");

      const statusText =
        document.getElementById("statusText");

      button.disabled = false;
      button.textContent =
        "สมัครสมาชิก";

      statusText.textContent =
        "ไม่สามารถตรวจสอบผลการสมัครได้ กรุณาลองใหม่";

      statusText.className =
        "error";
    }

    window.addEventListener(
        "load",
      
      function() {
        applyLanguage();
        initializeLiff();
  }
);
