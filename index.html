<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>สมัครสมาชิกชมรมยิงปืน</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      min-height: 100vh;
      margin: auto;
      padding: 24px;
      background: #f5f5f5;
    }

    .card {
      padding: 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 22px;
      text-align: center;
      color: #666666;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 13px;
      margin-bottom: 12px;
      border: 1px solid #cccccc;
      border-radius: 8px;
      background: #ffffff;
      font-size: 16px;
    }

    input:focus,
    select:focus {
      border-color: #333333;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 8px;
      background: #222222;
      color: #ffffff;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #statusText {
      margin-top: 16px;
      text-align: center;
      color: #666666;
      font-size: 14px;
      white-space: pre-line;
    }

    .success {
      color: #16863a !important;
    }

    .error {
      color: #c62828 !important;
    }
  </style>
</head>

<body>

  <div class="card">

    <h2>สมัครสมาชิกชมรมยิงปืน</h2>

    <p class="subtitle">
      สำหรับนักศึกษา
    </p>

    <input
      id="universityId"
      type="text"
      inputmode="numeric"
      maxlength="20"
      placeholder="รหัสนักศึกษา"
    >

    <input
      id="name"
      type="text"
      maxlength="100"
      placeholder="ชื่อ - นามสกุล"
    >

    <select id="facultyOrUnit">
      <option value="">
        กรุณาเลือกคณะหรือวิทยาลัย
      </option>

      <option value="คณะแพทยศาสตร์">
        คณะแพทยศาสตร์
      </option>

      <option value="คณะทันตแพทยศาสตร์">
        คณะทันตแพทยศาสตร์
      </option>

      <option value="คณะเภสัชศาสตร์">
        คณะเภสัชศาสตร์
      </option>

      <option value="คณะพยาบาลศาสตร์">
        คณะพยาบาลศาสตร์
      </option>

      <option value="คณะเทคนิคการแพทย์">
        คณะเทคนิคการแพทย์
      </option>

      <option value="คณะการแพทย์แผนไทย">
        คณะการแพทย์แผนไทย
      </option>

      <option value="คณะวิศวกรรมศาสตร์">
        คณะวิศวกรรมศาสตร์
      </option>

      <option value="คณะวิทยาศาสตร์">
        คณะวิทยาศาสตร์
      </option>

      <option value="คณะทรัพยากรธรรมชาติ">
        คณะทรัพยากรธรรมชาติ
      </option>

      <option value="คณะอุตสาหกรรมเกษตร">
        คณะอุตสาหกรรมเกษตร
      </option>

      <option value="คณะสัตวแพทยศาสตร์">
        คณะสัตวแพทยศาสตร์
      </option>

      <option value="คณะวิทยาการจัดการ">
        คณะวิทยาการจัดการ
      </option>

      <option value="คณะศิลปศาสตร์">
        คณะศิลปศาสตร์
      </option>

      <option value="คณะนิติศาสตร์">
        คณะนิติศาสตร์
      </option>

      <option value="คณะเศรษฐศาสตร์">
        คณะเศรษฐศาสตร์
      </option>

      <option value="วิทยาลัยนานาชาติ">
        วิทยาลัยนานาชาติ
      </option>

      <option value="บัณฑิตวิทยาลัย">
        บัณฑิตวิทยาลัย
      </option>
    </select>

    <button
      id="registerButton"
      type="button"
      onclick="saveData()"
      disabled
    >
      กำลังเชื่อมต่อ LINE...
    </button>

    <div id="statusText">
      กำลังเริ่มต้นระบบ LINE...
    </div>

  </div>

  <iframe
    id="apiFrame"
    name="apiFrame"
    title="API response"
    style="display: none;"
  ></iframe>

  <script>
    const LIFF_ID =
      "2010089876-qsjILd9E";

    const WEB_APP_URL =
      "https://script.google.com/macros/s/AKfycbydVoWAsCrdAb4n6hKQErxU869TeUgMyuwqrTrBRycXdU0_oqlN0M8D_fSvFurTd9C1WQ/exec";

    const MEMBER_TYPE = "Student";

    let lineIdToken = "";
    let submitTimeout = null;
    let isSubmitting = false;
    let resultPollTimer = null;
    let currentRequestId = "";
    
    async function initializeLiff() {
      const button =
        document.getElementById("registerButton");

      const statusText =
        document.getElementById("statusText");

      try {
        statusText.className = "";
        statusText.textContent =
          "กำลังเชื่อมต่อกับ LINE...";

        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          statusText.textContent =
            "กำลังเข้าสู่ระบบ LINE...";

          liff.login();
          return;
        }

        statusText.textContent =
          "กำลังอ่านข้อมูลบัญชี LINE...";

        const profile =
          await liff.getProfile();

        lineIdToken =
          String(liff.getIDToken() || "").trim();

        if (!profile.userId || !lineIdToken) {
          throw new Error(
            "ไม่สามารถอ่านข้อมูลบัญชี LINE ได้"
          );
        }

        button.disabled = false;
        button.textContent = "สมัครสมาชิก";

        statusText.textContent =
          "พร้อมใช้งาน: " +
          (profile.displayName || "ผู้ใช้ LINE");

        statusText.className = "success";

      } catch (error) {
        console.error(error);

        button.disabled = true;
        button.textContent =
          "เชื่อมต่อ LINE ไม่สำเร็จ";

        statusText.textContent =
          error.message || "เกิดข้อผิดพลาด";

        statusText.className = "error";
      }
    }

    function saveData() {
  if (isSubmitting) {
    return;
  }

  const currentIdToken =
    String(liff.getIDToken() || "").trim();

  const decodedToken =
    liff.getDecodedIDToken();

  const currentTime =
    Math.floor(Date.now() / 1000);

  if (
    !currentIdToken ||
    !decodedToken ||
    !decodedToken.exp ||
    decodedToken.exp <= currentTime
  ) {
    alert(
      "ข้อมูลเข้าสู่ระบบ LINE หมดอายุแล้ว\n" +
      "กรุณาปิดหน้านี้แล้วเปิดใหม่อีกครั้ง"
    );

    if (liff.isInClient()) {
      liff.closeWindow();
    }

    return;
  }

  lineIdToken = currentIdToken;

  const universityId =
    document
      .getElementById("universityId")
      .value
      .trim();

  const name =
    document
      .getElementById("name")
      .value
      .trim();

  const facultyOrUnit =
    document
      .getElementById("facultyOrUnit")
      .value
      .trim();

  if (
    !universityId ||
    !name ||
    !facultyOrUnit
  ) {
    alert("กรุณากรอกข้อมูลให้ครบทุกช่อง");
    return;
  }

  if (!/^\d+$/.test(universityId)) {
    alert("รหัสนักศึกษาต้องเป็นตัวเลขเท่านั้น");
    return;
  }

  const button =
    document.getElementById("registerButton");

  const statusText =
    document.getElementById("statusText");

  isSubmitting = true;

  button.disabled = true;
  button.textContent = "กำลังสมัคร...";

  statusText.className = "";
  statusText.textContent =
    "กำลังตรวจสอบและบันทึกข้อมูลสมาชิก...";

  currentRequestId =
    "req_" +
    Date.now() +
    "_" +
    Math.random().toString(36).slice(2);

  const form =
    document.createElement("form");

  form.method = "POST";
  form.action = WEB_APP_URL;
  form.target = "apiFrame";
  form.style.display = "none";

  const values = {
    action: "register",
    requestId: currentRequestId,
    universityId: universityId,
    name: name,
    facultyOrUnit: facultyOrUnit,
    memberType: MEMBER_TYPE,
    idToken: lineIdToken
  };

  Object.keys(values).forEach(function(key) {
    const input =
      document.createElement("input");

    input.type = "hidden";
    input.name = key;
    input.value = values[key];

    form.appendChild(input);
  });

  document.body.appendChild(form);

  form.submit();

  startResultPolling(currentRequestId);

  setTimeout(function() {
    if (form.isConnected) {
      form.remove();
    }
  }, 2000);
}
    
function startResultPolling(requestId) {
  const startedAt = Date.now();

  function poll() {
    if (Date.now() - startedAt > 25000) {
      handleRegisterTimeout();
      return;
    }

    const script =
      document.createElement("script");

    script.src =
      WEB_APP_URL +
      "?action=registerResult" +
      "&requestId=" +
      encodeURIComponent(requestId) +
      "&callback=registerResultCallback" +
      "&_=" +
      Date.now();

    script.onerror = function() {
      script.remove();

      resultPollTimer =
        setTimeout(poll, 1000);
    };

    document.body.appendChild(script);

    setTimeout(function() {
      if (script.isConnected) {
        script.remove();
      }
    }, 3000);
  }

  window.registerResultCallback =
    function(result) {
      if (!result || !result.ready) {
        resultPollTimer =
          setTimeout(poll, 1000);

        return;
      }

      handleRegisterResult(result);
    };

  poll();
}


function handleRegisterResult(result) {
  clearTimeout(resultPollTimer);

  isSubmitting = false;

  const button =
    document.getElementById("registerButton");

  const statusText =
    document.getElementById("statusText");

  alert(
    result.message ||
    "ระบบตอบกลับเรียบร้อย"
  );

  if (result.success) {
    button.disabled = true;
    button.textContent = "สมัครสำเร็จ";

    statusText.textContent =
      "สมัครสมาชิกสำเร็จ";

    statusText.className =
      "success";

    if (liff.isInClient()) {
      setTimeout(function() {
        liff.closeWindow();
      }, 800);
    }

    return;
  }

  button.disabled = false;
  button.textContent = "สมัครสมาชิก";

  statusText.textContent =
    result.message ||
    "สมัครสมาชิกไม่สำเร็จ";

  statusText.className = "error";
}


function handleRegisterTimeout() {
  clearTimeout(resultPollTimer);

  isSubmitting = false;

  const button =
    document.getElementById("registerButton");

  const statusText =
    document.getElementById("statusText");

  button.disabled = false;
  button.textContent = "สมัครสมาชิก";

  statusText.textContent =
    "ไม่สามารถตรวจสอบผลการสมัครได้ กรุณาตรวจสอบข้อมูลในระบบ";

  statusText.className = "error";
}
    window.addEventListener(
      "load",
      initializeLiff
    );
  </script>

</body>
</html>
